<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ My Love Proposal ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* ⭐ CHANGE NAME HERE ⭐ */
:root{
--partner-name:"HIBA";
}

/* Falling Roses */

.roses{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
overflow:hidden;
}

.rose{
position:absolute;
top:-50px;
font-size:30px;
animation:fall linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-50px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:.8;
}

}

/* Floating Hearts */

.heart{
position:absolute;
bottom:-50px;
font-size:22px;
animation:floatHeart linear infinite;
opacity:.7;
}

@keyframes floatHeart{

0%{
transform:translateY(0);
opacity:.8;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* Card */

.card{

width:90%;
max-width:520px;

background:rgba(255,255,255,.22);

backdrop-filter:blur(15px);

padding:30px;

border-radius:25px;

text-align:center;

box-shadow:0 0 35px rgba(0,0,0,.25);

border:2px solid rgba(255,255,255,.4);

z-index:5;

animation:popup .8s;

}

@keyframes popup{

0%{
transform:scale(.5);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

h1{

color:#ff0066;

margin-bottom:20px;

font-size:34px;

}

#question{

font-size:24px;

color:#222;

margin-bottom:25px;

font-weight:bold;

}

button{

padding:13px 30px;

border:none;

border-radius:40px;

font-size:20px;

cursor:pointer;

margin:10px;

transition:.3s;

}

.yes{

background:#4CAF50;

color:white;

}

.yes:hover{

transform:scale(1.1);

}

.no{

background:#f44336;

color:white;

position:relative;

}

#funny{

margin-top:20px;

font-size:20px;

color:#e91e63;

font-weight:bold;

}

</style>
</head>

<body>

<div class="roses"></div>

<div id="hearts"></div>

<div class="card">

<h1>❤️ Just For You ❤️</h1>

<h2 id="question"></h2>

<button class="yes" onclick="yesAnswer()">Yes ❤️</button>

<button class="no" id="noBtn" onclick="noAnswer()">No 😅</button>

<p id="funny"></p>

</div>

<script>

// ⭐ CHANGE NAME HERE ⭐
const partnerName = "Hiba";

const questions=[

`1. ❤️ ${partnerName}, are you happy that Allah brought us together?`,

`2. 🥰 ${partnerName}, do you smile whenever you think about me?`,

`3. 🌹 ${partnerName}, will you always let me be the reason for your smile?`,

`4. 🤗 ${partnerName}, will you always hold my hand forever?`,

`5. 💖 ${partnerName}, do you believe we are made for each other?`,

`6. ✨ ${partnerName}, will you make countless beautiful memories with me?`,

`7. 🏡 ${partnerName}, are you excited for our future home together?`,

`8. 💍 ${partnerName}, will you support me in every happiness and hardship?`,

`9. ❤️ ${partnerName}, will you always stay by my side?`,

`10. 👑 ${partnerName}, will you be my forever soulmate? ❤️`
    function yesAnswer(){

current++;

if(current<questions.length){

document.getElementById("question").innerHTML=questions[current];

document.getElementById("funny").innerHTML="";

}else{

document.querySelector(".card").innerHTML=`

<h1>💖 I Love You 💖</h1>

<h2>${partnerName} ❤️</h2>

<h3>Will You Marry Me? 💍</h3>

<p style="font-size:22px;margin-top:20px;line-height:1.8;">

From the day you came into my life,<br>

Everything became more beautiful. ❤️<br><br>

I promise to respect you,<br>

Support you,<br>

Protect you,<br>

Make you smile every day,<br>

And love you forever. 🥹❤️

</p>

<h2 style="margin-top:25px;">

Forever Yours ❤️

</h2>

`;

}

}

function noAnswer(){

const btn=document.getElementById("noBtn");

btn.style.position="fixed";

btn.style.left=Math.random()*(window.innerWidth-120)+"px";

btn.style.top=Math.random()*(window.innerHeight-70)+"px";

document.getElementById("funny").innerHTML=

funny[Math.floor(Math.random()*funny.length)];

}

// 🌹 Falling Roses

const roses=document.querySelector(".roses");

for(let i=0;i<40;i++){

let rose=document.createElement("div");

rose.className="rose";

rose.innerHTML="🌹";

rose.style.left=Math.random()*100+"vw";

rose.style.fontSize=(20+Math.random()*20)+"px";

rose.style.animationDuration=(5+Math.random()*5)+"s";

rose.style.animationDelay=Math.random()*5+"s";

roses.appendChild(rose);

}

// 💕 Floating Hearts

const hearts=document.getElementById("hearts");

for(let i=0;i<20;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(18+Math.random()*20)+"px";

heart.style.animationDuration=(6+Math.random()*6)+"s";

heart.style.animationDelay=Math.random()*5+"s";

hearts.appendChild(heart);

}

</script>

</body>
</html>
